title: Canton Node SDK Documentation
description: Auto-generated documentation for Canton Node SDK operations

# Include _generated in processing
include:
  - _generated

# Help-center / Intercom source (not part of the Jekyll API doc site)
exclude:
  - founders
  - doc-agent
  - investors
  - AGENTS.md
  - CLAUDE.md
  - README.md
  - TABLE-OF-CONTENTS.md
  - review-checklist.md
  - sync-manifest.json
  - sync-to-intercom.py
  - .gitignore

collections:
  operations:
    output: true
    permalink: /operations/:name/

defaults:
  - scope:
      path: "_operations"
      type: operations
    values:
      layout: default
  - scope:
      path: "_generated/operations.md"
    values:
      layout: default
      permalink: /operations/

markdown: kramdown
permalink: pretty 
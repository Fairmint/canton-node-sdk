name: Check Pinned Dependencies

on:
  pull_request:

jobs:
  check-pinned-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check pinned dependencies
        run: npx --yes --package @hardlydifficult/ci-scripts@1.0.85 check-pinned-deps

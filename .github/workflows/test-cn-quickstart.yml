name: Test CN-Quickstart Integration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-cn-quickstart:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Compute Quickstart Env Cache Key
        id: quickstart-env-cache-key
        run: |
          set -euo pipefail
          key="$(git ls-tree HEAD libs/splice libs/cn-quickstart | sha256sum | cut -d' ' -f1)"
          echo "submodules=$key" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.14'

      - name: Upgrade npm
        run: npm install --global npm@^11.10.0

      - name: Initialize Submodules
        run: |
          set -euo pipefail

          init_submodule() {
            local path="$1"
            shift
            if git submodule update --init "$@" "$path"; then
              return
            fi

            # If a previous run left an incomplete checkout around, retry from a clean directory.
            echo "Submodule init failed for $path, retrying with clean checkout..."
            rm -rf "$path"
            git submodule update --init "$@" "$path"
          }

          init_submodule libs/splice --depth 1
          init_submodule libs/cn-quickstart --recursive

          splice_version="$(tr -d '[:space:]' < libs/splice/VERSION)"
          if [[ -z "${splice_version}" ]]; then
            echo "libs/splice/VERSION is empty"
            exit 1
          fi
          echo "CANTON_LOCALNET_SPLICE_VERSION=${splice_version}" >> "$GITHUB_ENV"

      - name: Restore Quickstart Env Cache
        id: quickstart-env-cache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/libs/cn-quickstart/quickstart/.env.local
          key: quickstart-env-${{ runner.os }}-${{ hashFiles('.github/workflows/test-cn-quickstart.yml', 'package.json', 'package-lock.json', 'scripts/localnet-cloud.sh') }}-${{ steps.quickstart-env-cache-key.outputs.submodules }}

      - name: Restore Node Dependencies Cache
        id: node-cache-restore
        uses: actions/cache/restore@v6
        with:
          path: |
            ${{ github.workspace }}/node_modules
          key: node-deps-${{ runner.os }}-${{ hashFiles('package.json', 'package-lock.json') }}

      - name: Verify Cached Prerequisites
        id: verify-cache
        run: |
          set -euo pipefail

          if [ -d "node_modules" ]; then
            echo "has_node_modules=true" >> $GITHUB_OUTPUT
          else
            echo "has_node_modules=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Dependencies
        if: steps.verify-cache.outputs.has_node_modules != 'true'
        run: npm install

      - name: Start CN-Quickstart
        run: |
          splice_version="$(tr -d '[:space:]' < libs/splice/VERSION)"
          if [[ ! "${splice_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid pinned Splice version: ${splice_version}" >&2
            exit 1
          fi
          echo "Starting CN-Quickstart with pinned Splice ${splice_version}"
          CANTON_LOCALNET_SPLICE_VERSION="${splice_version}" npm run localnet:start
          echo "✓ CN-Quickstart started"
        timeout-minutes: 15

      - name: Save Quickstart Env Cache
        if: steps.quickstart-env-cache-restore.outputs.cache-hit != 'true'
        id: quickstart-env-cache-save
        uses: actions/cache/save@v6
        with:
          path: ${{ github.workspace }}/libs/cn-quickstart/quickstart/.env.local
          key: ${{ steps.quickstart-env-cache-restore.outputs.cache-primary-key }}

      - name: Save Node Dependencies Cache
        if: steps.node-cache-restore.outputs.cache-hit != 'true'
        id: node-cache-save
        uses: actions/cache/save@v6
        with:
          path: |
            ${{ github.workspace }}/node_modules
          key: ${{ steps.node-cache-restore.outputs.cache-primary-key }}

      - name: Build SDK
        run: npm run build

      - name: Run LocalNet Smoke + Integration Tests
        run: |
          echo "Running tests..."
          npm run localnet:smoke
          npm run test:integration
          echo "✓ Tests passed!"

      - name: Show Logs on Failure
        if: failure()
        run: npm run localnet:logs

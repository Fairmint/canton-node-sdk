name: Test CN-Quickstart Integration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-cn-quickstart:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.14'

      - name: Upgrade npm
        run: npm install --global npm@^11.10.0

      - name: Initialize Submodules
        run: |
          set -euo pipefail

          init_submodule() {
            local path="$1"
            shift
            if git submodule update --init "$@" "$path"; then
              return
            fi

            # If a previous run left an incomplete checkout around, retry from a clean directory.
            echo "Submodule init failed for $path, retrying with clean checkout..."
            rm -rf "$path"
            git submodule update --init "$@" "$path"
          }

          init_submodule libs/splice --depth 1
          init_submodule libs/cn-quickstart --recursive

      - name: Restore Node Dependencies Cache
        id: node-cache-restore
        uses: actions/cache/restore@v6
        with:
          path: |
            ${{ github.workspace }}/node_modules
          key: node-deps-${{ runner.os }}-${{ hashFiles('package.json', 'package-lock.json') }}

      - name: Verify Cached Prerequisites
        id: verify-cache
        run: |
          set -euo pipefail

          if [ -d "node_modules" ]; then
            echo "has_node_modules=true" >> $GITHUB_OUTPUT
          else
            echo "has_node_modules=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Dependencies
        if: steps.verify-cache.outputs.has_node_modules != 'true'
        run: npm install

      - name: Start CN-Quickstart
        run: |
          npm run localnet:start
          echo "✓ CN-Quickstart started"
        timeout-minutes: 15

      - name: Save Node Dependencies Cache
        if: steps.node-cache-restore.outputs.cache-hit != 'true'
        id: node-cache-save
        uses: actions/cache/save@v6
        with:
          path: |
            ${{ github.workspace }}/node_modules
          key: ${{ steps.node-cache-restore.outputs.cache-primary-key }}

      - name: Build SDK
        run: npm run build

      - name: Run LocalNet Smoke + Integration Tests
        run: |
          echo "Running tests..."
          npm run localnet:smoke
          npm run test:integration
          echo "✓ Tests passed!"

      - name: Show Logs on Failure
        if: failure()
        run: |
          echo "==================== Docker Containers ===================="
          docker ps -a || true

          echo "==================== Docker Compose Logs ===================="
          if [ -d "libs/cn-quickstart/quickstart" ]; then
            cd libs/cn-quickstart/quickstart
            docker compose \
              -f docker/modules/localnet/compose.yaml \
              -f docker/modules/keycloak/compose.yaml \
              --env-file .env \
              --env-file .env.local \
              --env-file docker/modules/localnet/compose.env \
              --env-file docker/modules/localnet/env/common.env \
              --env-file docker/modules/keycloak/compose.env \
              --profile app-provider \
              --profile app-user \
              --profile sv \
              --profile keycloak \
              logs --tail=100 || true
          fi

          echo "==================== Canton Logs ===================="
          if [ -f libs/cn-quickstart/quickstart/logs/canton.log ]; then
            tail -100 libs/cn-quickstart/quickstart/logs/canton.log
          fi
